name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: prospects_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Installation des dépendances
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Lint (flake8)
        run: flake8 app/ --max-line-length=120 --exclude=__pycache__

      - name: Exécution des tests (pytest)
        run: pytest -v
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/prospects_db
          SECRET_KEY: test-secret-key

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t prospects-api:ci .