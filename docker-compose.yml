services:
  db:
    image: postgres:16-alpine
    container_name: prospects_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prospects_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: prospects_api
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "5000"

  nginx:
    image: nginx:alpine
    container_name: prospects_nginx
    restart: always
    ports:
      - "8090:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  postgres_data: